name = "vocab-ai-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Enable Workers AI binding
[ai]
binding = "AI"

# R2 bucket for TTS cache
[[r2_buckets]]
binding = "TTS_CACHE"
bucket_name = "vocab-tts-cache"

# Environment variables
[vars]
SUPABASE_URL = "https://aurfktfcvfzjhxhmumvy.supabase.co"
# Note: Secrets should be added via wrangler secret put:
#   wrangler secret put SUPABASE_SERVICE_KEY
#   wrangler secret put YOUDAO_APP_KEY
#   wrangler secret put YOUDAO_APP_SECRET
