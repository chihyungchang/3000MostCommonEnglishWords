# Generated by Hover Cloud. Runs your Playwright specs in YOUR CI — no AI in
# the loop, just deterministic tests — and reports each run to your dashboard.
# Hover Cloud never executes tests; this workflow does, on your Actions minutes.
name: Hover E2E
on:
  pull_request:
  workflow_dispatch:
# Cancel a superseded run when new commits land on the same ref.
concurrency:
  group: hover-e2e-${{ github.ref }}
  cancel-in-progress: true
jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      BASE_URL: http://localhost:5173
      # The app needs its real backend in CI — without these, Supabase calls
      # hit a placeholder URL and the UI never gets past its loading state.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_AI_WORKER_URL: ${{ secrets.VITE_AI_WORKER_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start the app
        run: npm run dev &
      - name: Wait for the app
        run: npx --yes wait-on "$BASE_URL" --timeout 120000
      - name: Run Playwright specs
        run: npx playwright test __vibe_tests__ --reporter=html,json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: hover-results.json
      - name: Report the run to Hover Cloud
        if: ${{ !cancelled() }}
        env:
          HOVER_INGEST_URL: ${{ secrets.HOVER_INGEST_URL }}
          HOVER_INGEST_TOKEN: ${{ secrets.HOVER_INGEST_TOKEN }}
        run: |
          if [ ! -f hover-results.json ]; then echo "no results file"; exit 0; fi
          curl -sS -X POST \
            "$HOVER_INGEST_URL?source=${{ github.event_name }}&branch=${{ github.head_ref || github.ref_name }}&sha=${{ github.sha }}&ci_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -H "Authorization: Bearer $HOVER_INGEST_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @hover-results.json -o hover-ingest-response.json \
            || echo "upload failed (non-blocking)"
      # On a PR, Hover Cloud returns a ready-made comment (failed specs, their
      # heal hints, per-spec flakiness context, an AI read of the failure).
      # Posted from YOUR CI with the workflow's own token — Cloud has no write
      # access to the repo.
      - name: Comment the failures on the PR (Hover)
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f hover-ingest-response.json ]; then exit 0; fi
          jq -r '.prComment // empty' hover-ingest-response.json > hover-pr-comment.md
          if [ -s hover-pr-comment.md ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body-file hover-pr-comment.md || true
          fi
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
#
# Testing a deployed URL instead of building in CI? Delete the "Start the app"
# + "Wait for the app" steps and point BASE_URL at your deployment.
