# Generated by Hover Cloud. Runs your Playwright specs in YOUR CI — no AI in
# the loop, just deterministic tests — and reports each run to your dashboard.
# Hover Cloud never executes tests; this workflow does, on your Actions minutes.
name: Hover E2E
on:
  pull_request:
  # Manual runs (the Actions "Run workflow" button, or Run now in Hover
  # Cloud) let you pick WHERE the specs run. "local" boots the app inside
  # this runner; the other options point the same specs at that GitHub
  # Environment's HOVER_BASE_URL.
  workflow_dispatch:
    inputs:
      environment:
        description: 'Where to run the specs'
        type: choice
        default: local
        options:
          - local
          - production
# Cancel a superseded run when new commits land on the same ref.
concurrency:
  group: hover-e2e-${{ github.ref }}
  cancel-in-progress: true
jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    # Binds the GitHub Environment picked above (PRs always run local;
    # scheduled runs use the monitored environment). The environment supplies
    # its own HOVER_BASE_URL variable and any environment-scoped secrets.
    environment: ${{ github.event.inputs.environment || (github.event_name == 'schedule' && 'local' || '') || 'local' }}
    env:
      HOVER_ENV: ${{ github.event.inputs.environment || (github.event_name == 'schedule' && 'local' || '') || 'local' }}
      BASE_URL: ${{ vars.HOVER_BASE_URL || 'http://localhost:5173' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Only the local environment boots the app inside CI — remote
      # environments point the same specs at their own deployed URL.
      - name: Start the app
        if: ${{ env.HOVER_ENV == 'local' }}
        run: npm run dev &
      - name: Wait for the app
        run: npx --yes wait-on "$BASE_URL" --timeout 120000
      - name: Run Playwright specs
        run: npx playwright test __vibe_tests__ --reporter=html,json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: hover-results.json
          HOVER_BASE_URL: ${{ env.BASE_URL }}
          # Test accounts (managed in Hover Cloud -> project -> Test
          # accounts). Each environment can override these with its own values.
          HOVER_USER_USER: ${{ secrets.HOVER_USER_USER }}
          HOVER_USER_PASS: ${{ secrets.HOVER_USER_PASS }}
      - name: Report the run to Hover Cloud
        if: ${{ !cancelled() }}
        env:
          HOVER_INGEST_URL: ${{ secrets.HOVER_INGEST_URL }}
          HOVER_INGEST_TOKEN: ${{ secrets.HOVER_INGEST_TOKEN }}
        run: |
          if [ ! -f hover-results.json ]; then echo "no results file"; exit 0; fi
          curl -sS -X POST \
            "$HOVER_INGEST_URL?source=${{ github.event_name }}&branch=${{ github.head_ref || github.ref_name }}&sha=${{ github.sha }}&ci_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}&env=${{ env.HOVER_ENV }}" \
            -H "Authorization: Bearer $HOVER_INGEST_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @hover-results.json -o hover-ingest-response.json \
            || echo "upload failed (non-blocking)"
      # Aggregate the run's verdict onto the commit as a "hover/e2e" status,
      # deep-linked to the run in Hover Cloud. Shows in the PR's checks box.
      # Posted from YOUR CI with the workflow's own token — Cloud has no write
      # access to the repo.
      - name: Report the status to the commit (Hover)
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f hover-ingest-response.json ]; then exit 0; fi
          RUN_STATUS=$(jq -r '.runStatus // empty' hover-ingest-response.json)
          RUN_URL=$(jq -r '.runUrl // empty' hover-ingest-response.json)
          DESC=$(jq -r '.statusDescription // "See Hover Cloud"' hover-ingest-response.json)
          if [ -z "$RUN_STATUS" ]; then exit 0; fi
          # flaky counts as success for the merge gate — it passed on retry.
          STATE=success
          if [ "$RUN_STATUS" = "failed" ]; then STATE=failure; fi
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$STATE" -f context="hover/e2e" \
            -f description="$DESC" -f target_url="$RUN_URL" || true
      # On a PR, Hover Cloud returns a ready-made comment (failed specs, their
      # heal hints, per-spec flakiness context, an AI read of the failure).
      # Posted from YOUR CI with the workflow's own token — Cloud has no write
      # access to the repo.
      - name: Comment the failures on the PR (Hover)
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f hover-ingest-response.json ]; then exit 0; fi
          jq -r '.prComment // empty' hover-ingest-response.json > hover-pr-comment.md
          if [ -s hover-pr-comment.md ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body-file hover-pr-comment.md || true
          fi
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      # Failure screenshots/traces. Hover Cloud pulls the screenshot for a
      # failed spec from this artifact to show it inline on the run page.
      - name: Upload test results (screenshots)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: hover-test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
#
# Testing a deployed URL instead of building in CI? Delete the "Start the app"
# + "Wait for the app" steps and point BASE_URL at your deployment.
